<!DOCTYPE html>
<html>
<head>
    <title>Welcome to FitFuture!</title>
</head>

<body>

    <header>
        <h1>A Fit Future Awaits!</h1>
        <p>Your personal fitness analytics and training companion.</p>
    </header>

    <hr>

    <main>

        <form>

            <section>
                <h2>Personal Information</h2>

                <label for="firstName">First Name</label>
                <input
                    type="text"
                    id="firstName"
                    name="firstName"
                    placeholder="Enter first name"
                    required
                >

                <br><br>

                <label for="lastName">Last Name</label>
                <input
                    type="text"
                    id="lastName"
                    name="lastName"
                    placeholder="Enter last name"
                    required
                >

                <br><br>

                <label for="email">Email</label>
                <input
                    type="email"
                    id="email"
                    name="email"
                    placeholder="example@gmail.com"
                    required
                >

                <br><br>

                <label for="age">Age</label>
                <input
                    type="number"
                    id="age"
                    name="age"
                    min="10"
                    max="100"
                    required
                >

                <br><br>

                <label for="gender">Gender</label>
                <select id="gender" name="gender" required>
                    <option value="">Select Gender</option>
                    <option value="male">Male</option>
                    <option value="female">Female</option>
                    <option value="other">Other</option>
                    <option value="preferNotToSay">Prefer not to say</option>
                </select>

                <br><br>

                <label for="height">Height (cm)</label>
                <input
                    type="number"
                    id="height"
                    name="height"
                    min="100"
                    max="250"
                    required
                >

                <br><br>

                <label for="currentWeight">Current Weight</label>
                <input
                    type="number"
                    id="currentWeight"
                    name="currentWeight"
                    min="20"
                    max="300"
                    required
                >

                <input
                    type="radio"
                    id="currentKg"
                    name="currentWeightUnit"
                    value="kg"
                    checked
                >
                <label for="currentKg">Kg</label>

                <input
                    type="radio"
                    id="currentLbs"
                    name="currentWeightUnit"
                    value="lbs"
                >
                <label for="currentLbs">Lbs</label>

                <br><br>

                <label for="targetWeight">Target Weight</label>
                <input
                    type="number"
                    id="targetWeight"
                    name="targetWeight"
                    min="20"
                    max="300"
                    required
                >

                <input
                    type="radio"
                    id="targetKg"
                    name="targetWeightUnit"
                    value="kg"
                    checked
                >
                <label for="targetKg">Kg</label>

                <input
                    type="radio"
                    id="targetLbs"
                    name="targetWeightUnit"
                    value="lbs"
                >
                <label for="targetLbs">Lbs</label>

            </section>

            <hr>

            <section>
                <h2>Fitness Goals</h2>

                <label for="goal">Primary Goal</label>

                <select id="goal" name="goal" required>
                    <option value="">Select Goal</option>
                    <option value="muscleGain">Muscle Gain</option>
                    <option value="fatLoss">Fat Loss</option>
                    <option value="endurance">Endurance</option>
                    <option value="generalFitness">General Fitness</option>
                </select>

                <br><br>

                <p>Activity Level</p>

                <input
                    type="radio"
                    id="sedentary"
                    name="activityLevel"
                    value="sedentary"
                    required
                >
                <label for="sedentary">Sedentary</label>

                <br>

                <input
                    type="radio"
                    id="lightlyActive"
                    name="activityLevel"
                    value="lightlyActive"
                >
                <label for="lightlyActive">Lightly Active</label>

                <br>

                <input
                    type="radio"
                    id="moderatelyActive"
                    name="activityLevel"
                    value="moderatelyActive"
                >
                <label for="moderatelyActive">Moderately Active</label>

                <br>

                <input
                    type="radio"
                    id="veryActive"
                    name="activityLevel"
                    value="veryActive"
                >
                <label for="veryActive">Very Active</label>

                <br>

                <input
                    type="radio"
                    id="athlete"
                    name="activityLevel"
                    value="athlete"
                >
                <label for="athlete">Athlete</label>

                <br><br>

                <label for="experience">Training Experience</label>

                <select
                    id="experience"
                    name="experience"
                    required
                >
                    <option value="">Select Experience</option>
                    <option value="beginner">Beginner</option>
                    <option value="intermediate">Intermediate</option>
                    <option value="advanced">Advanced</option>
                </select>

            </section>

            <hr>

            <section>
                <h2>Preferred Workout Days</h2>

                <input type="checkbox" id="monday" name="workoutDays" value="monday">
                <label for="monday">Monday</label>

                <br>

                <input type="checkbox" id="tuesday" name="workoutDays" value="tuesday">
                <label for="tuesday">Tuesday</label>

                <br>

                <input type="checkbox" id="wednesday" name="workoutDays" value="wednesday">
                <label for="wednesday">Wednesday</label>

                <br>

                <input type="checkbox" id="thursday" name="workoutDays" value="thursday">
                <label for="thursday">Thursday</label>

                <br>

                <input type="checkbox" id="friday" name="workoutDays" value="friday">
                <label for="friday">Friday</label>

                <br>

                <input type="checkbox" id="saturday" name="workoutDays" value="saturday">
                <label for="saturday">Saturday</label>

                <br>

                <input type="checkbox" id="sunday" name="workoutDays" value="sunday">
                <label for="sunday">Sunday</label>

            </section>

            <hr>

            <section>
                <h2>Additional Notes</h2>

                <label for="notes">
                    Tell us about your fitness goals
                </label>

                <br>

                <textarea
                    id="notes"
                    name="notes"
                    rows="6"
                    cols="50"
                    placeholder="I want to gain 5 kg of muscle in the next year..."
                ></textarea>

            </section>

            <br>

            <button type="submit">
                Create My Fitness Profile
            </button>

        </form>

    </main>

    <hr>

    <footer>
        <p>FitFuture © 2026</p>
    </footer>

</body>
</html>
